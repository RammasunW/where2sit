name: deploy

on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create deployment zip
        run: |
          zip -r "django_deploy-${{github.sha}}.zip" . \
            -x "*.git*" "__pycache__/*" "venv/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: django_app
          path: django_deploy-${{github.sha}}.zip

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: "us-east-2"

      - name: Upload to S3
        run: |
          aws s3 cp django_deploy-${{github.sha}}.zip s3://terraform-state-where2sit-rammasunw/

      - name: Create EB version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name where2sit \
            --source-bundle S3Bucket="terraform-state-where2sit-rammasunw",S3Key="django_deploy-${{github.sha}}.zip" \
            --version-label "ver-${{github.sha}}" \
            --description "deploy-${{github.sha}}"

      - name: Deploy
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name where2sit-environment \
            --version-label "ver-${{github.sha}}"