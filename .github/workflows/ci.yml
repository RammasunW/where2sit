name: CI - Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests with coverage
        run: pytest --cov=rooms --cov-report=term --cov-report=xml -v

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Frontend & Playwright
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: frontend
        run: |
          npx playwright test
      - name: Create unique deployment zip
        run: |
          ZIP_NAME="flaskbb_deploy-${{ github.run_id }}.zip"
          
          zip -r $ZIP_NAME . -x ".git*" "*.pytest_cache*" "frontend/node_modules*"
          
          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flaskbb_deploy-${{ github.run_id }}
          path: ${{ env.ZIP_FILE }}