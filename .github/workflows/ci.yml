name: CI - Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make migrations
        run: python manage.py makemigrations

      - name: Run migrations
        run: python manage.py migrate

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run unit and integration tests with coverage
        run: pytest --cov=rooms --cov-report=term --cov-report=xml -v rooms/tests.py rooms/test_integration.py

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      # Launch application in background
      - name: Start Django development server
        run: |
          python manage.py runserver 8000 &
          sleep 5  # Wait for server to start
        env:
          DJANGO_SETTINGS_MODULE: wheretosit.settings

      - name: Run E2E tests
        run: pytest rooms/test_e2e.py --base-url=http://localhost:8000 -v

      # Stop server (cleanup)
      - name: Stop Django server
        if: always()
        run: pkill -f runserver || true