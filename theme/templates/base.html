<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>where2sit - Find Your Perfect Study Spot</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- CSRF Token needed? -->
    <meta name="htmx-config" content='{"csrfToken": "{{ csrf_token }}"}'>
</head>

<body class="bg-gray-50 font-sans antialiased">

    <!-- nav bar -->
    <nav class="bg-white shadow-md sticky top-0 z50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <!--Would be putting a logo right about here...-->
                <a href="/" class="flex items-center space-x-2">
                    <span class="text-xl font-bold text-blue-600">where2sit</span>
                </a>

                <!--Search bar(placeholder)-->
                <div class="hidden md: flex-1 max-w-md mx-8">
                    <input type="text"
                            placeholder="Search for rooms..."
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>

                <!--Nav links-->
                <div class="flex items-center space-x-6">
                    <a href="{% url 'rooms:room_list' %}" class="text-gray-600 hover:text-primary transition">Rooms</a>
                    <a href="#" class="text-gray-600 hover:text-primary transition">Bookings</a>

                    {% if user.is_authenticated %}
                        <a href="#" class="text-grey-600 hover:text-primary transition">My Profile</a>
                        <a href="#" class="btn-primary py-2">Logout</a>
                    {% else %}
                        <a href="#" class="btn-primary py-2">Sign In</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!--Main content where child templates insert their content...-->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 mt-16">
        <div class="container mx-auto px-4 py-8">
            <div class="text-center text-gray-500 text-sm">
                © 2026 where2sit. Find your perfect study spot on campus.
            </div>
        </div>
    </footer>

    <!--Additional scripts potentially added by child templates-->
    {% block scripts %}
    {% endblock %}
</body>
</html>
