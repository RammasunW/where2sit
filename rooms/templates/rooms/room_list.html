{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">All Rooms</h1>
    
    {% if rooms %}
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for room in rooms %}
        <div class="card">
            <h3 class="text-xl font-bold">{{ room.building }} {{ room.number }}</h3>
            <p class="text-gray-600">Capacity: {{ room.capacity }} seats</p>
            <div class="mt-4">
                <a href="#" class="text-blue-500 hover:text-blue-700">View Details →</a>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-gray-600">No rooms available yet.</p>
    {% endif %}

</div>
{% endblock %}
